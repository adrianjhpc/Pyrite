<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPI Visualiser</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
</head>
<body>
    <div id="app-container">
        <aside id="sidebar">
            <div class="sidebar-header">
                <h2>MPI Profiler</h2>
                <p>Hardware Mapping</p>
            </div>
            <div class="control-group">
                <label for="profileLoader" class="btn-load">📂 Load .json Profile</label>
                <input type="file" id="profileLoader" accept=".json">
            </div>
            <div class="control-group playback-panel">
                <h3>Timeline</h3>
                <div class="time-display">T: <span id="currentTimeLabel">0.000</span> s</div>
                <input type="range" id="timeSlider" min="0" max="100" value="0" step="0.001" disabled>
                <div class="playback-controls">
                    <button id="btn-play" disabled>▶ Play</button>
                    <label>Speed: <input type="range" id="speedSlider" min="0.1" max="5" value="1" step="0.1"></label>
                </div>
            </div>
            <div class="stats-panel" style="margin-top: 20px; padding: 15px; background: #161b22; border-radius: 6px;">
                <h3 style="font-size: 0.9rem; color: #8b949e; text-transform: uppercase; margin-bottom: 10px;">Message Spectrogram</h3>
                <div id="spectrogramContainer" style="width: 100%; overflow-x: auto;">
                </div>
            </div>
        </aside>

        <main id="canvas-container">
            <div id="visCanvas"></div> </main>
    </div>

    <script src="visualiser.js"></script>
</body>
</html>
